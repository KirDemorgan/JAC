upstream backend {
    server backend:8080;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Common proxy headers ─────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Host              $http_host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;

    # Client upload limit
    client_max_body_size    10m;

    # ── SSE stream (Server-Sent Events) ─────────────────────────────────────
    # Must come before the generic /api block so this location matches first.
    location = /sse {
        proxy_pass              http://backend;

        # Disable all buffering — SSE requires streaming
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      86400s;   # keep connection alive up to 24 h
        proxy_send_timeout      86400s;

        # Tell Nginx not to set Connection: close
        proxy_set_header        Connection "";

        # Chunked transfer needed for streaming
        chunked_transfer_encoding on;

        # Gzip would break streaming
        gzip off;
    }

    # ── Backend REST API ─────────────────────────────────────────────────────
    location ~ ^/(api|auth|actuator)(/|$) {
        proxy_pass              http://backend;
        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;
    }

    # ── Next.js frontend ─────────────────────────────────────────────────────
    location / {
        proxy_pass              http://frontend;

        # WebSocket support (Next.js HMR in dev; safe to keep in prod)
        proxy_set_header        Upgrade     $http_upgrade;
        proxy_set_header        Connection  "upgrade";

        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;
    }
}
